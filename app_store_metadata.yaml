# ════════════════════════════════════════════════════════════════════════════
# APP STORE METADATA - InnerCycles (ASO-Optimized February 2026)
# ════════════════════════════════════════════════════════════════════════════
# Copy these values into App Store Connect.
# Title + Subtitle + Keyword Field are all indexed by Apple's algorithm.
# Screenshot captions are also indexed via OCR (June 2025 change).
# RULE: Never repeat keywords across title, subtitle, and keyword field.
# Apple's algorithm is additive — it auto-combines tokens across all fields.
# ════════════════════════════════════════════════════════════════════════════

# ── TITLE (30 char max) ──────────────────────────────────────────────────
title: "InnerCycles: Journal & Diary"  # 28 chars — captures "journal" + "diary" (2 top category terms in title)

# ── SUBTITLE (30 char max) ───────────────────────────────────────────────
subtitle: "Mood Tracker & Self Reflection"  # 30 chars — captures "mood", "tracker", "self", "reflection"

# ── KEYWORD FIELD (100 char max, comma-separated, no spaces) ─────────────
# Do NOT repeat words from title/subtitle. Apple auto-combines tokens.
# Singular forms only — Apple auto-indexes plurals.
# "journal", "daily", "mood", "tracker", "self", "reflection" already in title/subtitle.
keywords: "dream,streak,wellness,mindfulness,pattern,gratitude,habit,mental,health,emotion,insight,private,sleep"
# 100 chars — 13 unique terms. "diary" moved to title, "prompt" dropped. Added "private" + "sleep" (high volume)

# ── SPANISH (MEXICO) LOCALE HACK ────────────────────────────────────────
# US App Store indexes BOTH en-US and es-MX. Populate es-MX with additional
# English keywords to effectively double indexable keyword space (160→320 chars).
es_mx_keywords: "feelings,writing,growth,therapy,anxiety,stress,calm,mind,aware,goals,routine,check,note,ai,log"
# 98 chars — 15 high-intent terms. Dropped low-value "positivity,affirmation,happiness,self-help"

# ── CATEGORY ─────────────────────────────────────────────────────────────
primary_category: "Lifestyle"
secondary_category: "Health & Fitness"

# ── SCREENSHOT CAPTIONS (keyword-rich for OCR indexing) ──────────────────
screenshot_captions:
  1: "Your emotions have patterns — a personal journal that helps you see them"
  2: "Daily journaling streaks — track progress, celebrate milestones"
  3: "Dream journal — record, search, and decode your dreams"
  4: "Personalized reflections — discover what your mood patterns reveal"
  5: "Mood tracker visualized — spot emotional trends across weeks and months"
  6: "Home Screen widgets — your streak, daily prompt, and mood at a glance"
  7: "Dark and light themes — a calm, private diary designed around you"
  8: "Birthday agenda — never forget important dates, get reminders"
  9: "Apple Watch mood log — track how you feel, right from your wrist"
  10: "Private and secure — your journal, your data, your control"

# ── PROMOTIONAL TEXT (170 chars, can be updated without review) ──────────
promotional_text: "New: Discover emotional patterns in your journal. Personalized reflections, mood tracking, dream journal, streak milestones, and iOS widgets. Private by design."
# 160 chars — pattern-first hook, feature-rich, privacy closer

# ── DESCRIPTION (iOS — not indexed, optimized for conversion) ────────────
description: |
  Your emotions have patterns. InnerCycles helps you see them.

  Track your moods, journal daily, decode your dreams, and discover what drives how you feel — with personalized reflections that connect the dots across your entries. Beautiful, private, and designed to grow with you.

  Whether you journal every morning, log moods throughout the day, or want to remember your dreams, InnerCycles adapts to your rhythm and reveals the bigger picture of your inner life.

  — DAILY JOURNALING —
  • Write freely with guided prompts or open entries
  • Track focus areas: energy, emotions, decisions, social life
  • Build lasting streaks with gentle reminders
  • Review monthly patterns and personal insights

  — MOOD TRACKING —
  • Log your mood in seconds with beautiful visual tracking
  • Spot emotional patterns over days, weeks, and months
  • Understand what influences how you feel

  — DREAM JOURNAL —
  • Record dreams before they fade
  • Track recurring themes and symbols
  • Build a searchable dream archive

  — PERSONALIZED REFLECTIONS —
  • Receive pattern-based insights drawn from your entries
  • Discover connections you might have missed
  • Gentle, private, and never judgmental

  — MORE FEATURES —
  • Birthday Agenda: Never forget important dates
  • iOS Widgets: See your streak and prompts at a glance
  • Apple Watch: Quick mood logging from your wrist
  • Beautiful dark and light themes with pastel aesthetics
  • Your data, your control — private by default
  • Available in English, Turkish, German, and French

  — WHY INNERCYCLES? —
  Unlike simple diary apps, InnerCycles uses pattern recognition to help you understand your cycles — emotional, creative, social, and personal. Past entries suggest trends. You notice what matters. Growth happens naturally.

  Start your journaling practice today. Your future self will thank you.

  — INNERCYCLES PREMIUM —
  • Personalized reflections and insights
  • Advanced pattern detection
  • Unlimited entries and dream logs
  • Monthly and annual reflection reports
  • Ad-free experience

  Subscriptions: Monthly or Annual plans available. Payment charged to iTunes Account at confirmation of purchase. Subscription auto-renews unless turned off at least 24 hours before the end of the current period. Manage subscriptions in Account Settings.

  Privacy Policy: https://umutnull-woltemade.github.io/innercycles/privacy.html
  Terms of Use: https://umutnull-woltemade.github.io/innercycles/terms.html

# ── WHAT'S NEW (for next update) ─────────────────────────────────────────
whats_new: |
  What's New in InnerCycles:
  - First-entry celebration with animated milestone
  - iOS Home Screen and Lock Screen widgets
  - Apple Watch companion for quick mood logging
  - Personalized reflections for deeper insights
  - Birthday Agenda with notifications
  - Enhanced streak tracking with milestone celebrations
  - Improved readability and pastel design refresh
  - Bug fixes and performance improvements

# ── REVIEW NOTES (paste into App Store Connect → App Review Information) ──
review_notes: |
  InnerCycles is a personal journaling app for mood tracking, self-reflection, and emotional pattern recognition. No login is required — users can start journaling immediately.

  HOW TO TEST:
  1. Launch the app and complete the brief onboarding (enter name, select focus areas).
  2. On the home screen, create a journal entry. After saving, a first-entry celebration appears.
  3. Explore Dream Journal, Mood Tracking, and Pattern insights from the home feed.
  4. Open Settings to see profile, notification preferences, and Premium subscription options.
  5. Check iOS Widgets: add InnerCycles widgets from the Home Screen editor.

  SIGN-IN: Optional. Users may sign in with Apple for cloud backup. All core features work without an account.

  SUBSCRIPTIONS: InnerCycles Premium is offered as Monthly ($7.99) and Annual ($29.99) auto-renewing subscriptions, plus a Lifetime ($79.99) one-time purchase, via RevenueCat/StoreKit 2. Free users have full access to journaling, dream logging, and basic pattern insights; Premium unlocks AI reflections, advanced patterns, and an ad-free experience.

  ATT PROMPT: The app requests App Tracking Transparency permission to serve personalized ads via Google AdMob. If the user declines, only non-personalized ads are shown. Premium subscribers see no ads.

  CONTENT: Reflective prompts and insights are generated from a curated content database combined with AI-assisted content generation. AI-generated content is clearly labeled, safety-filtered to remove predictive or diagnostic language. No user-generated content is displayed to other users. The app does not provide medical, psychological, or predictive advice. Full AI usage policy at https://umutnull-woltemade.github.io/innercycles/ai-policy.html.

  BIRTH DATE: Birth date is collected solely for age verification and birthday-themed reflection prompts. No astrological calculations are performed.

  iOS WIDGETS: 5 widget types available (Daily Reflection, Mood Insight, Weekly Mood Grid, Daily Focus, Lock Screen). Data flows via App Groups (group.com.venusone.innercycles) and MethodChannel bridge.

  APPLE WATCH: Companion app for quick mood logging. Data synced via WatchConnectivity.

  PRIVACY: No personal data is shared with third parties beyond analytics (Apple App Analytics) and ads (AdMob). Full privacy policy at https://umutnull-woltemade.github.io/innercycles/privacy.html.

  CONTACT: support@innercycles.app

